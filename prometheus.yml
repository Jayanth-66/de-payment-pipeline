global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "flink-jobmanager"
    static_configs:
      - targets: ["flink-jobmanager:9249"]

  - job_name: "flink-taskmanager"
    static_configs:
      - targets: ["flink-taskmanager:9249"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "airflow"
    static_configs:
      - targets: ["statsd:9102"]